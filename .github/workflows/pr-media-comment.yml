name: PR Media Comment

# Cuando un PR toca public/content-uploads/**, deja un comentario con el
# impacto aproximado en peso (spec §17.4.3).

on:
  pull_request:
    paths:
      - 'public/content-uploads/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute delta
        id: delta
        shell: bash
        run: |
          set -euo pipefail
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch origin "$BASE_REF" --depth 50

          ADDED=$(git diff --name-only --diff-filter=A "origin/$BASE_REF"...HEAD -- 'public/content-uploads/' || true)
          MODIFIED=$(git diff --name-only --diff-filter=M "origin/$BASE_REF"...HEAD -- 'public/content-uploads/' || true)
          DELETED=$(git diff --name-only --diff-filter=D "origin/$BASE_REF"...HEAD -- 'public/content-uploads/' || true)

          TOTAL=0
          format_file() {
            local f="$1"
            if [ -f "$f" ]; then
              local size=$(stat -c%s "$f")
              TOTAL=$((TOTAL + size))
              printf "| \`%s\` | %.2f KB |\n" "$f" "$(echo "$size/1024" | bc -l)"
            fi
          }

          {
            echo "## 📷 Cambios en multimedia"
            echo
            if [ -n "$ADDED" ]; then
              echo "**Agregados:**"
              echo
              echo "| Archivo | Tamaño |"
              echo "| --- | --- |"
              for f in $ADDED; do format_file "$f"; done
              echo
            fi
            if [ -n "$MODIFIED" ]; then
              echo "**Modificados:**"
              echo
              for f in $MODIFIED; do echo "- \`$f\`"; done
              echo
            fi
            if [ -n "$DELETED" ]; then
              echo "**Eliminados:**"
              echo
              for f in $DELETED; do echo "- \`$f\`"; done
              echo
            fi
            echo
            printf "**Impacto aproximado en peso (adds):** %.2f MB\n" "$(echo "$TOTAL/1024/1024" | bc -l)"
          } > /tmp/comment.md

          echo "comment_file=/tmp/comment.md" >> "$GITHUB_OUTPUT"

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/comment.md', 'utf-8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
